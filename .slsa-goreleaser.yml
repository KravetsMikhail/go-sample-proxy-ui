version: 1

# Minimal SLSA Go builder config for go-sample-proxy-ui

# Optional: environment variables used during compilation.
env:
  - GO111MODULE=on
  - CGO_ENABLED=0

# Target platform. GOOS/GOARCH will be set by the builder.
goos: linux
goarch: amd64

# Entrypoint to compile.
main: ./main.go

# Optional: working directory (keep default: repo root).
# dir: .

# Binary output name.
binary: proxy-ui-linux-amd64

