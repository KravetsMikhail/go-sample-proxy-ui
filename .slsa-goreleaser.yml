version: 1

# Minimal SLSA Go builder config for go-sample-proxy-ui

builds:
  - id: proxy-ui
    main: ./main.go
    binary: proxy-ui
    goos:
      - linux
    goarch:
      - amd64

release:
  # Let the SLSA Go builder manage artifacts; this section can be
  # extended later if you need more platforms or archives.
  prerelease: false

